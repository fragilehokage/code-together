services:
  - type: web
    name: collaborative-ide
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    # Required for WebSocket support on Render
    # The Connection and Upgrade headers must be forwarded
    headers:
      - path: /ws
        name: Connection
        value: Upgrade
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4050
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
